name: postgresql
base: core24
version: '16.8'
summary: PostgreSQL in a snap.
description: |
  PostgreSQL is a free and open-source relational database management
  system emphasizing extensibility and SQL compliance.

platforms:
  amd64:
  arm64:
grade: stable
confinement: strict

system-usernames:
  _daemon_: shared

plugs:
  shared-memory:
    private: true

hooks:
  install:
    plugs:
      - network

layout:
  /usr/bin/perl:
    symlink: $SNAP/usr/bin/perl
  /usr/bin/snapped_install:
    symlink: $SNAP/usr/bin/install
  /usr/bin/pg_lsclusters:
    symlink: $SNAP/usr/bin/pg_lsclusters
  /usr/bin/pg_ctlcluster:
    symlink: $SNAP/usr/bin/pg_ctlcluster
  /usr/bin/pg_dropcluster:
    symlink: $SNAP/usr/bin/pg_dropcluster
  /usr/lib/python3/dist-packages:
    bind: $SNAP/usr/lib/python3/dist-packages
  /etc/perl:
    bind: $SNAP/etc/perl
  /usr/local/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/perl:
    bind: $SNAP/usr/local/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/perl
  /usr/local/share/perl:
    bind: $SNAP/usr/local/share/perl
  /usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/perl5:
    bind: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/perl5
  /usr/share/perl5:
    bind: $SNAP/usr/share/perl5
  /usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/perl-base:
    bind: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/perl-base
  /usr/share/perl:
    bind: $SNAP/usr/share/perl
  /usr/local/lib/site_perl:
    bind: $SNAP/usr/local/lib/site_perl
  /usr/lib/postgresql/16:
    bind: $SNAP/usr/lib/postgresql/16
  /var/cache/postgresql:
    bind: $SNAP_COMMON/var/cache/postgresql
  /etc/postgresql:
    bind: $SNAP_COMMON/etc/postgresql
  /etc/postgresql-common:
    bind: $SNAP_COMMON/etc/postgresql-common
  /var/lib/postgresql:
    bind: $SNAP_COMMON/var/lib/postgresql
  /var/log/postgresql:
    bind: $SNAP_COMMON/var/log/postgresql
  /usr/share/postgresql:
    bind: $SNAP/usr/share/postgresql

apps:
  createdb:
    command: usr/bin/createdb
  createuser:
    command: usr/bin/createuser
  archivecleanup:
    command: archivecleanup.sh
  buildext:
    command: usr/bin/pg_buildext
  createcluster:
    command: create-cluster.sh
    plugs:
      - network
  dropcluster:
    command: drop-cluster.sh
  isready:
    command: usr/bin/pg_isready
  restore:
    command: usr/bin/pg_restore
    plugs:
      - network
  # upgradecluster:
  #   command: usr/bin/pg_upgradecluster
  # backupcluster:
  #   command: usr/bin/pg_backupcluster
  config:
    command: usr/bin/pg_config
  dump:
    command: usr/bin/pg_dump
    plugs:
      - network
  lsclusters:
    command: usr/bin/pg_lsclusters
  recvlogical:
    command: usr/bin/pg_recvlogical
  # restorecluster:
  #   command: usr/bin/pg_restorecluster
  # virtualenv:
  #   command: usr/bin/pg_virtualenv
  basebackup:
    command: usr/bin/pg_basebackup
  conftool:
    command: usr/bin/pg_conftool
  ctl:
    command: usr/lib/postgresql/16/bin/pg_ctl
  ctlcluster:
    command: ctl-cluster.sh
    plugs:
      - network
      - network-bind
  dumpall:
    command: usr/bin/pg_dumpall
    plugs:
      - network
  receivewal:
    command: usr/bin/pg_receivewal
  renamecluster:
    command: rename-cluster.sh
    plugs:
      - network
      - network-bind
  # updatedicts:
  #   command: usr/sbin/pg_updatedicts
  pgbench:
    command: usr/bin/pgbench
  psql:
    command: usr/bin/psql
    plugs:
      - network
  postgresql:
    command: >-
      ctl-cluster.sh --skip-systemctl-redirect --foreground 16 main start
    daemon: simple
    plugs:
      - network
      - network-bind

parts:
  postgres-debs:
    plugin: nil
    stage-packages:
      - postgresql=16+257build1
      - util-linux
      - locales-all
      - coreutils
    override-stage: |
      craftctl default
      # Use bundled install
      ls -1 $SNAPCRAFT_STAGE/usr/bin/pg_* | xargs sed -i \
        "s/system 'install'/system 'snapped_install'/g"
      sed -i "s/system 'install'/system 'snapped_install'/g" \
        $SNAPCRAFT_STAGE/usr/share/perl5/PgCommon.pm
      sed -i 's/qw(install/qw(snapped_install/g' \
        $SNAPCRAFT_STAGE/usr/bin/pg_createcluster
      sed -i "s/system ('install'/system ('snapped_install'/g" \
        $SNAPCRAFT_STAGE/usr/bin/pg_createcluster
      # Use tmp for socket and bundled install
      ls -1 $SNAPCRAFT_STAGE/usr/bin/pg_* | xargs sed -i \
        's/\/var\/run\/postgresql/\/tmp/g'
      sed -i 's/\/var\/run\/postgresql/\/tmp/g' \
        $SNAPCRAFT_STAGE/usr/share/perl5/PgCommon.pm
      # Pass user in startup checks
      sed -i "s/psql -h /psql -U postgres -h /g" \
        $SNAPCRAFT_STAGE/usr/bin/pg_ctlcluster
    organize:
      etc/postgresql: default-config/etc/postgresql
      etc/postgresql-common: default-config/etc/postgresql-common
      var/lib/postgresql: default-config/var/lib/postgresql
      var/log/postgresql: default-config/var/log/postgresql
      usr/share/doc/postgresql/copyright: licenses/COPYRIGHT-postgresql
      usr/share/doc/util-linux/copyright: licenses/COPYRIGHT-util-linux
      usr/share/doc/locales-all/copyright: licenses/COPYRIGHT-locales-all
  snap-license:
    plugin: dump
    source: .
    source-type: local
    stage:
      - licenses/LICENSE-snap
    organize:
      LICENSE: licenses/LICENSE-snap
  wrapper:
    plugin: dump
    source: snap/local
