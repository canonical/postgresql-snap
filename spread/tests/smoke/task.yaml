summary: PostgreSQL SNAP smoke tests

execute: |
  echo "Running smoke test..."
  SNAP_VERSION=$(awk -F\' '/version/{print $2}' "${PROJECT_PATH}"/snap/snapcraft.yaml)
  sd-postgresql.psql -U postgres -h /tmp -c "SELECT version();" | \
    grep "^ PostgreSQL ${SNAP_VERSION:-error}"

  echo "Ensure all tools have been shipped.."
  sd-postgresql.archivecleanup --help
  sd-postgresql.basebackup --help
  sd-postgresql.config --help
  sd-postgresql.conftool --help
  # sd-postgresql.createcluster --help # Missing --help
  sd-postgresql.createdb --help
  # sd-postgresql.createuser --help # Missing --help
  sd-postgresql.ctl --help
  sd-postgresql.ctlcluster 18 main status # Missing --help
  # sd-postgresql.dropcluster --help # Missing --help
  sd-postgresql.dump --help
  sd-postgresql.dumpall --help
  sd-postgresql.isready --help
  sd-postgresql.lsclusters --help
  sd-postgresql.pgbench --help
  sd-postgresql.psql --help
  sd-postgresql.receivewal --help
  sd-postgresql.recvlogical --help
  # sd-postgresql.renamecluster --help # Missing --help
  sd-postgresql.restore --help

