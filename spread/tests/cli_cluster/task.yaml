summary: PostgreSQL cluster CLIs tests

execute: |
  echo "Testing *cluster ..."

  postgresql.lsclusters
  postgresql.psql -U postgres -h /tmp -c "SELECT NOW();"
  PGPASSWORD=pgpass postgresql.psql -U postgres -h 127.0.0.1 -c "SELECT NOW();"

  postgresql.ctlcluster --skip-systemctl-redirect 18 main status
  postgresql.ctlcluster --skip-systemctl-redirect 18 main stop
  postgresql.ctlcluster --skip-systemctl-redirect 18 main status && exit 1 || true # failure expected
  postgresql.ctlcluster --skip-systemctl-redirect 18 main start
  postgresql.ctlcluster --skip-systemctl-redirect 18 main status
  postgresql.psql -U postgres -h /tmp -c "SELECT NOW();"

  postgresql.createcluster 18 test1
  postgresql.lsclusters 18 test1
  postgresql.ctlcluster --skip-systemctl-redirect 18 test1 start
  postgresql.lsclusters 18 test1
  postgresql.psql -U postgres -h /tmp -p 5433 -d postgres -c "SELECT NOW();"

  postgresql.lsclusters 18
  postgresql.renamecluster 18 test1 test123
  postgresql.lsclusters 18


  postgresql.lsclusters 18 test123
  postgresql.dropcluster --stop 18 test123
  postgresql.lsclusters 18 test123 && exit 1 || true # failure expected
  
