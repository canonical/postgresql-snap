summary: PostgreSQL cluster CLIs tests

execute: |
  echo "Testing *cluster ..."

  postgresql.lsclusters
  postgresql.psql -U postgres -h /tmp -c "SELECT NOW();"

  postgresql.ctlcluster --skip-systemctl-redirect 19 main status
  postgresql.ctlcluster --skip-systemctl-redirect 19 main stop
  postgresql.ctlcluster --skip-systemctl-redirect 19 main status && exit 1 || true # failure expected
  postgresql.ctlcluster --skip-systemctl-redirect 19 main start
  postgresql.ctlcluster --skip-systemctl-redirect 19 main status
  postgresql.psql -U postgres -h /tmp -c "SELECT NOW();"

  postgresql.createcluster 19 test1
  postgresql.lsclusters 19 test1
  postgresql.ctlcluster --skip-systemctl-redirect 19 test1 start
  postgresql.lsclusters 19 test1
  postgresql.psql -U postgres -h /tmp -p 5433 -d postgres -c "SELECT NOW();"

  postgresql.lsclusters 19
  postgresql.renamecluster 19 test1 test123
  postgresql.lsclusters 19


  postgresql.lsclusters 19 test123
  postgresql.dropcluster --stop 19 test123
  postgresql.lsclusters 19 test123 && exit 1 || true # failure expected
  
